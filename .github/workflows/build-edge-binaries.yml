name: Build Edge Binaries

on:
  push:
    branches: [main]
    paths:
      - 'edge_controller/**'
  pull_request:
    branches: [main]
    paths:
      - 'edge_controller/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, arm]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: edge_controller
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o ../bin/edge-controller-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/controller

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-controller-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/edge-controller-${{ matrix.goos }}-${{ matrix.goarch }}
