version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  station-simulator:
    build: ./station_simulator
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      PUBLISH_INTERVAL: "2.0"
      MANIFEST_INTERVAL: "15.0"

  ai-engine:
    build: ./ai_decision_engine
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  edge-controller:
    build: ./edge_controller
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      REDIS_ADDR: redis:6379
      AI_ENGINE_URL: http://ai-engine:8000

  mission-control-ui:
    build: ./mission_control_ui
    ports:
      - "3000:3000"
    depends_on:
      - ai-engine
