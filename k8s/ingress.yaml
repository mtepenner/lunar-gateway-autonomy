apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: gateway.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ai-engine
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mission-control-ui
                port:
                  number: 3000
